<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Huawei SMC + RSE8800A — API Reference</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Titillium Web',sans-serif;background:#fafafa;color:#3b4151;font-size:14px;line-height:1.5}
a{color:#61affe;text-decoration:none}

.topbar{background:#1b1b1b;padding:8px 16px;display:flex;align-items:center;gap:12px}
.topbar-logo{font-size:20px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px}
.topbar-logo svg{width:32px;height:32px}

.info-wrap{padding:20px 30px 0}
.info-title{font-size:32px;font-weight:700;margin-bottom:4px}
.info-title .version{font-size:14px;font-weight:700;background:#89bf04;color:#fff;padding:3px 8px;border-radius:4px;margin-left:8px;vertical-align:middle}
.info-base{font-size:12px;color:#999;margin-bottom:4px}
.info-link{font-size:12px;color:#61affe;margin-bottom:8px;display:block}
.info-desc{font-size:14px;color:#3b4151;margin-bottom:16px}

.schemes-row{padding:8px 30px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #e8e8e8}
.schemes-label{font-size:12px;font-weight:700;color:#3b4151;margin-right:8px}
.schemes-select{border:2px solid #41444e;border-radius:4px;padding:4px 8px;font-size:13px;color:#3b4151;background:#fff;cursor:pointer}
.authorize-btn{border:2px solid #49cc90;background:rgba(73,204,144,.1);color:#3b4151;padding:6px 16px;border-radius:4px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px}
.authorize-btn:hover{background:rgba(73,204,144,.2)}
.lock-icon{font-size:16px}

.main{padding:0 30px 60px}

.tag-block{margin-bottom:0;border:1px solid rgba(59,65,81,.3);border-radius:4px;margin-top:16px;overflow:hidden}
.tag-header{padding:10px 20px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;background:rgba(0,0,0,.07);user-select:none}
.tag-header:hover{background:rgba(0,0,0,.1)}
.tag-title{font-size:18px;font-weight:700;color:#3b4151}
.tag-desc-text{font-size:13px;color:#666;margin-left:10px;font-weight:400}
.tag-chevron{font-size:20px;color:#3b4151;transition:transform .2s}
.tag-chevron.closed{transform:rotate(-90deg)}

.ep-wrap{border-top:1px solid rgba(59,65,81,.3)}
.ep-row{display:flex;align-items:center;padding:0;cursor:pointer;border-bottom:1px solid rgba(59,65,81,.1)}
.ep-row:last-child{border-bottom:none}
.ep-row:hover .ep-summary-bar{opacity:0.85}
.ep-summary-bar{display:flex;align-items:center;width:100%;padding:8px 16px;gap:10px}
.method-tag{font-size:14px;font-weight:700;padding:6px 0;min-width:80px;text-align:center;border-radius:3px;flex-shrink:0}
.t-post{background:#49cc90;color:#fff}
.t-get{background:#61affe;color:#fff}
.t-delete{background:#f93e3e;color:#fff}
.t-patch{background:#50e3c2;color:#fff}
.t-ws{background:#9012fe;color:#fff}
.ep-path{font-size:16px;font-weight:700;font-family:'Source Code Pro',monospace;color:#3b4151;flex:1}
.ep-op-summary{font-size:13px;color:#3b4151;flex:1}
.new-tag{font-size:11px;font-weight:700;background:#ff6b35;color:#fff;padding:2px 7px;border-radius:3px;flex-shrink:0}
.ep-lock{font-size:14px;color:#aaa;flex-shrink:0}
.ep-chevron-sm{font-size:12px;color:#aaa;flex-shrink:0;transition:transform .2s}
.ep-chevron-sm.open{transform:rotate(180deg)}

/* colored left border by method */
.ep-row.row-post .ep-summary-bar{border-left:4px solid #49cc90}
.ep-row.row-get .ep-summary-bar{border-left:4px solid #61affe}
.ep-row.row-delete .ep-summary-bar{border-left:4px solid #f93e3e}
.ep-row.row-patch .ep-summary-bar{border-left:4px solid #50e3c2}
.ep-row.row-ws .ep-summary-bar{border-left:4px solid #9012fe}

.ep-row.row-post.open .ep-summary-bar{background:rgba(73,204,144,.1);border-color:#49cc90}
.ep-row.row-get.open .ep-summary-bar{background:rgba(97,175,254,.1);border-color:#61affe}
.ep-row.row-delete.open .ep-summary-bar{background:rgba(249,62,62,.1);border-color:#f93e3e}
.ep-row.row-patch.open .ep-summary-bar{background:rgba(80,227,194,.1);border-color:#50e3c2}
.ep-row.row-ws.open .ep-summary-bar{background:rgba(144,18,254,.1);border-color:#9012fe}

.ep-detail{display:none;padding:20px 20px 20px 24px;background:#fff;border-top:1px solid rgba(59,65,81,.2)}
.ep-detail.open{display:block}

.detail-section{margin-bottom:20px}
.detail-section-title{font-size:14px;font-weight:700;color:#3b4151;margin-bottom:10px;padding-bottom:4px;border-bottom:1px solid #e8e8e8}

.info-note{font-size:13px;padding:10px 14px;background:#e8f4fd;color:#0c4a6e;border-radius:4px;margin-bottom:14px;border-left:4px solid #61affe;line-height:1.6}
.desc-text{font-size:14px;color:#3b4151;margin-bottom:14px;line-height:1.7}
code{font-family:'Source Code Pro',monospace;font-size:12px;background:#f4f4f4;padding:2px 5px;border-radius:3px;color:#e74c3c}

.params-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:10px}
.params-table th{text-align:left;padding:8px 12px;background:#f7f7f7;border:1px solid #e8e8e8;font-weight:700;font-size:12px;color:#3b4151}
.params-table td{padding:8px 12px;border:1px solid #e8e8e8;vertical-align:top;color:#3b4151}
.req-star{color:#f93e3e;font-weight:700}
.type-str{color:#3b4151;font-style:italic;font-size:12px}

.model-schema{background:#f7f7f7;border:1px solid #e8e8e8;border-radius:4px;padding:12px 14px;font-family:'Source Code Pro',monospace;font-size:12px;color:#3b4151;line-height:1.8;white-space:pre;overflow-x:auto;margin-bottom:10px}

.resp-list{margin-bottom:10px}
.resp-item{border:1px solid #e8e8e8;border-radius:4px;margin-bottom:6px;overflow:hidden}
.resp-head{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#f7f7f7;cursor:pointer}
.resp-head:hover{background:#efefef}
.resp-code-badge{font-size:12px;font-weight:700;padding:3px 8px;border-radius:3px}
.r200{background:#d4edda;color:#155724}
.r204{background:#d4edda;color:#155724}
.r400{background:#fff3cd;color:#856404}
.r401{background:#f8d7da;color:#721c24}
.r404{background:#f8d7da;color:#721c24}
.resp-desc{font-size:13px;color:#555;flex:1}
.resp-body{padding:10px 12px;background:#fff;display:none}
.resp-body.open{display:block}

.try-section{margin-top:16px;padding:14px;background:#f9f9f9;border:1px solid #e8e8e8;border-radius:4px}
.try-title{font-size:13px;font-weight:700;color:#3b4151;margin-bottom:10px}
.try-params{margin-bottom:12px}
.try-param-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.try-param-label{font-size:12px;color:#3b4151;min-width:120px;font-weight:600}
.try-input{border:1px solid #d0d0d0;border-radius:4px;padding:6px 10px;font-size:13px;color:#3b4151;background:#fff;flex:1;font-family:inherit}
.try-input:focus{outline:none;border-color:#61affe;box-shadow:0 0 0 2px rgba(97,175,254,.2)}
.try-textarea{border:1px solid #d0d0d0;border-radius:4px;padding:8px 10px;font-size:12px;color:#3b4151;background:#fff;width:100%;height:120px;font-family:'Source Code Pro',monospace;resize:vertical;margin-bottom:10px}
.try-textarea:focus{outline:none;border-color:#61affe}
.try-btn{background:#4990e2;color:#fff;border:none;padding:8px 20px;border-radius:4px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.try-btn:hover{background:#357abd}
.try-btn:active{transform:scale(0.98)}
.try-result{margin-top:12px;display:none}
.try-result.show{display:block}
.try-result-label{font-size:12px;font-weight:700;color:#3b4151;margin-bottom:4px}
.try-curl{background:#41444e;color:#fff;border-radius:4px;padding:10px 12px;font-family:'Source Code Pro',monospace;font-size:11px;white-space:pre-wrap;margin-bottom:10px;word-break:break-all}
.try-response-code{font-size:13px;font-weight:700;margin-bottom:6px}
.code-green{color:#49cc90}
.try-response-body{background:#f7f7f7;border:1px solid #e8e8e8;border-radius:4px;padding:10px 12px;font-family:'Source Code Pro',monospace;font-size:12px;color:#3b4151;white-space:pre;overflow-x:auto;max-height:300px;overflow-y:auto}
</style>
</head>

<div class="topbar">
  <div class="topbar-logo">
    <svg viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="16" fill="#89bf04"/><text x="16" y="21" text-anchor="middle" font-size="14" font-weight="900" fill="white" font-family="Arial">S</text></svg>
    Swagger

</div>

<div class="info-wrap">
  <div class="info-title">Huawei SMC + RSE8800A API <span class="version">1.0</span></div>

<script>
var ENDPOINTS = [
  {
    tag:"authentication",
    tagDesc:"Единый вход, JWT токен",
    endpoints:[
      {
        method:"POST", path:"/login", summary:"Единый вход для SMC и RSE", isNew:true, locked:false,
        desc:"Единая точка входа. Заменяет GET /conf-portal/tokens и GET /sys-portal/tokens. Возвращает JWT токен, который используется для всех запросов к SMC и RSE. Токен не инвалидируется при входе с другого устройства.",
        info:"Новый API. Все последующие запросы передают токен через заголовок Authorization: Bearer {token}.",
        params:[],
        bodySchema:'{\n  "login": "api_operator",\n  "password": "your_password"\n}',
        responses:[
          {code:"200",desc:"Успешная аутентификация",schema:'{\n  "token": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiJkNGU4YTEyMyIsInVzZXJUeXBlIjoib3BlcmF0b3IiLCJleHAiOjE3MzA5OTk2MDB9.abc123",\n  "userId": "d4e8a123-4b5c-6d7e-8f9a-0b1c2d3e4f5a",\n  "userType": "operator",\n  "expiresAt": "2024-11-09T10:00:00Z"\n}'},
          {code:"401",desc:"Неверный логин или пароль",schema:'{\n  "code": 401,\n  "message": "Invalid credentials"\n}'}
        ],
        tryParams:[{name:"login",placeholder:"api_operator"},{name:"password",placeholder:"your_password"}],
        mockResponse:'{\n  "token": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiJkNGU4YTEyMyIsInVzZXJUeXBlIjoib3BlcmF0b3IiLCJleHAiOjE3MzA5OTk2MDB9.mock_signature_abc123",\n  "userId": "d4e8a123-4b5c-6d7e-8f9a-0b1c2d3e4f5a",\n  "userType": "operator",\n  "expiresAt": "2024-11-09T10:00:00Z"\n}'
      }
    ]
  },
  {
    tag:"conference",
    tagDesc:"Создание, управление, участники",
    endpoints:[
      {
        method:"POST", path:"/conf-portal/conferences", summary:"Создать конференцию", isNew:false, locked:true,
        desc:"Создаёт конференцию в SMC. При enableLiveBroadcast: true в ответе возвращается liveAddress. Поля guestPassword и chairmanPassword возвращаются в ответе — необходимо сохранить для веб-подключения участников.",
        info:null,
        params:[],
        bodySchema:'{\n  "conference": {\n    "subject": "Судебное заседание №2024-1234",\n    "chairmanPassword": "123456",\n    "guestPassword": "654321",\n    "conferenceTimeType": "INSTANT_CONFERENCE",\n    "scheduleStartTime": "2024-11-08T10:00:00Z",\n    "duration": 120\n  },\n  "streamService": {\n    "supportLive": true,\n    "supportRecord": true,\n    "autoRecord": true\n  },\n  "multiConferenceService": {\n    "conferenceCapabilitySetting": {\n      "type": "AVC",\n      "rate": 1920,\n      "enableLiveBroadcast": true,\n      "autoRecord": true\n    },\n    "conferencePolicySetting": {\n      "autoMute": true,\n      "autoExtend": true,\n      "maxParticipantNum": 500\n    }\n  }\n}',
        responses:[
          {code:"200",desc:"Конференция создана",schema:'{\n  "conference": {\n    "id": "3c33b694-ee6a-4034-8715-2746d818b352",\n    "subject": "Судебное заседание №2024-1234",\n    "chairmanPassword": "123456",\n    "guestPassword": "654321",\n    "active": true\n  },\n  "streamService": {\n    "supportLive": true,\n    "liveAddress": "https://rse1.sud.uz/live/3c33b694-.../stream.m3u8"\n  }\n}'},
          {code:"400",desc:"Неверные параметры запроса",schema:'{\n  "code": 400,\n  "message": "Bad Request"\n}'}
        ],
        tryParams:[{name:"subject",placeholder:"Судебное заседание №2024-1234"},{name:"guestPassword",placeholder:"654321"},{name:"chairmanPassword",placeholder:"123456"}],
        mockResponse:'{\n  "conference": {\n    "id": "3c33b694-ee6a-4034-8715-2746d818b352",\n    "subject": "Судебное заседание №2024-1234",\n    "chairmanPassword": "123456",\n    "guestPassword": "654321",\n    "active": true,\n    "scheduleStartTime": "2024-11-08T10:00:00Z"\n  },\n  "streamService": {\n    "supportLive": true,\n    "liveAddress": "https://rse1.sud.uz/live/3c33b694-ee6a-4034-8715-2746d818b352/stream.m3u8"\n  }\n}'
      },
      {
        method:"GET", path:"/online/conferences/{conferenceId}/detail", summary:"Детали активной конференции", isNew:false, locked:true,
        desc:"Возвращает текущее состояние активной конференции: статус записи, трансляции, количество участников онлайн.",
        info:null,
        params:[{name:"conferenceId",in:"path",required:true,type:"string (uuid)",desc:"ID конференции в SMC"}],
        bodySchema:null,
        responses:[
          {code:"200",desc:"Детали конференции",schema:'{\n  "conferenceUiParam": {\n    "id": "3c33b694-ee6a-4034-8715-2746d818b352",\n    "subject": "Судебное заседание №2024-1234",\n    "onlineParticipantNum": 3,\n    "totalParticipantNum": 5\n  },\n  "conferenceState": {\n    "recording": true,\n    "living": true,\n    "isMute": false,\n    "lock": false\n  }\n}'},
          {code:"404",desc:"Конференция не найдена",schema:'{\n  "code": 404,\n  "message": "Conference not found"\n}'}
        ],
        tryParams:[{name:"conferenceId",placeholder:"3c33b694-ee6a-4034-8715-2746d818b352"}],
        mockResponse:'{\n  "conferenceUiParam": {\n    "id": "3c33b694-ee6a-4034-8715-2746d818b352",\n    "subject": "Судебное заседание №2024-1234",\n    "onlineParticipantNum": 3,\n    "totalParticipantNum": 5,\n    "duration": 120\n  },\n  "conferenceState": {\n    "recording": true,\n    "living": true,\n    "isMute": false,\n    "lock": false\n  }\n}'
      },
      {
        method:"POST", path:"/online/conferences/{conferenceId}/participants", summary:"Добавить терминал (переговорную комнату)", isNew:false, locked:true,
        desc:"Добавляет физический терминал к активной конференции. SMC автоматически звонит на указанный URI терминала.",
        info:null,
        params:[{name:"conferenceId",in:"path",required:true,type:"string (uuid)",desc:"ID активной конференции"}],
        bodySchema:'[\n  {\n    "entryUuid": "76ecd26d-897e-4637-8b49-99ec59a25064",\n    "name": "Зал №3 — Суд Ташкента",\n    "uri": "9482634001",\n    "terminalType": "TE",\n    "rate": "1920",\n    "participantSourceType": "NORMAL"\n  }\n]',
        responses:[
          {code:"200",desc:"Участник добавлен",schema:'{\n  "resultCode": 0,\n  "message": "success"\n}'},
          {code:"404",desc:"Конференция не найдена",schema:'{\n  "code": 404,\n  "message": "Conference not found"\n}'}
        ],
        tryParams:[{name:"conferenceId",placeholder:"3c33b694-ee6a-4034-8715-2746d818b352"}],
        mockResponse:'{\n  "resultCode": 0,\n  "message": "success"\n}'
      },
      {
        method:"POST", path:"/online/conferences/{conferenceId}/attendees", summary:"Добавить слушателя из адресной книги", isNew:false, locked:true,
        desc:"Добавляет слушателя (пользователя из адресной книги SMC) к активной конференции.",
        info:null,
        params:[{name:"conferenceId",in:"path",required:true,type:"string (uuid)",desc:"ID активной конференции"}],
        bodySchema:'[\n  {\n    "name": "Иванов Иван",\n    "account": "ivanov@sud.uz",\n    "uri": "sip:ivanov@smc.sud.uz",\n    "organizationName": "Суд Ташкентской области",\n    "rate": 1920\n  }\n]',
        responses:[
          {code:"200",desc:"Слушатель добавлен",schema:'{\n  "resultCode": 0,\n  "message": "success"\n}'},
          {code:"400",desc:"Неверные параметры",schema:'{\n  "code": 400,\n  "message": "Bad Request"\n}'}
        ],
        tryParams:[{name:"conferenceId",placeholder:"3c33b694-ee6a-4034-8715-2746d818b352"}],
        mockResponse:'{\n  "resultCode": 0,\n  "message": "success"\n}'
      },
      {
        method:"GET", path:"/online/conferences/{conferenceId}/participants", summary:"Список участников и их статус", isNew:false, locked:true,
        desc:"Возвращает всех участников активной конференции с текущим статусом подключения.",
        info:null,
        params:[{name:"conferenceId",in:"path",required:true,type:"string (uuid)",desc:"ID активной конференции"}],
        bodySchema:null,
        responses:[

        ],
        tryParams:[{name:"conferenceId",placeholder:"3c33b694-ee6a-4034-8715-2746d818b352"}],
        mockResponse:'{\n  "participants": [\n    {\n      "id": "709a83c0-8ec6-4dca-8146-58277a1d3557",\n      "name": "Зал №3 — Суд Ташкента",\n      "uri": "9482634001",\n      "state": "ONLINE",\n      "audio": true,\n      "video": true\n    },\n    {\n      "id": "b9a44039-11ab-423f-99f6-c9f6aa744b34",\n      "name": "Иванов Иван",\n      "uri": "sip:ivanov@smc.sud.uz",\n      "state": "CALLING",\n      "audio": true,\n      "video": false\n    }\n  ]\n}'
      },
      {
        method:"PATCH", path:"/online/conferences/{conferenceId}/status", summary:"Управление — запись, mute, трансляция", isNew:false, locked:true,

        info:null,
        params:[{name:"conferenceId",in:"path",required:true,type:"string (uuid)",desc:"ID активной конференции"}],
        bodySchema:'{\n  "isMute": true,\n  "recordOp": {\n    "recordOpType": "START",\n    "live": true,\n    "audioRecord": false\n  }\n}',
        responses:[
          {code:"204",desc:"Операция выполнена",schema:'// No content'},
          {code:"400",desc:"Неверные параметры",schema:'{\n  "code": 400,\n  "message": "Bad Request"\n}'}
        ],
        tryParams:[{name:"conferenceId",placeholder:"3c33b694-ee6a-4034-8715-2746d818b352"}],
        mockResponse:'// 204 No Content\n// Операция выполнена успешно'
      },
      {
        method:"DELETE", path:"/online/conferences/{conferenceId}", summary:"Завершить конференцию", isNew:false, locked:true,
        desc:"Завершает активную конференцию. После завершения запись обрабатывается на RSE асинхронно.",
        info:null,
        params:[{name:"conferenceId",in:"path",required:true,type:"string (uuid)",desc:"ID активной конференции"}],
        bodySchema:null,
        responses:[
          {code:"204",desc:"Конференция завершена",schema:'// No content'},
          {code:"404",desc:"Конференция не найдена",schema:'{\n  "code": 404,\n  "message": "Conference not found"\n}'}
        ],
        tryParams:[{name:"conferenceId",placeholder:"3c33b694-ee6a-4034-8715-2746d818b352"}],

var methodColor = {POST:'t-post',GET:'t-get',DELETE:'t-delete',PATCH:'t-patch',WS:'t-ws'};
var methodRow = {POST:'row-post',GET:'row-get',DELETE:'row-delete',PATCH:'row-patch',WS:'row-ws'};
var respClass = {'200':'r200','204':'r204','400':'r400','401':'r401','404':'r404'};

function buildTry(ep, idx){
  var paramInputs = ep.tryParams.map(function(p){
    return '<div class="try-param-row"><span class="try-param-label">'+p.name+'</span><input class="try-input" id="tryp_'+idx+'_'+p.name+'" placeholder="'+p.placeholder+'" value="'+p.placeholder+'"></div>';
  }).join('');
  var bodyArea = ep.bodySchema ? '<div style="margin-bottom:6px;font-size:12px;font-weight:700;color:#3b4151">Request body</div><textarea class="try-textarea" id="trybody_'+idx+'">'+ep.bodySchema+'</textarea>' : '';
  return '<div class="try-section"><div class="try-title">Parameters</div><div class="try-params">'+paramInputs+'</div>'+bodyArea+'<button class="try-btn" onclick="execTry('+idx+')">Execute</button><div class="try-result" id="tryresult_'+idx+'"><div class="try-result-label">Curl</div><div class="try-curl" id="trycurl_'+idx+'"></div><div class="try-result-label">Response code</div><div class="try-response-code code-green" id="trycode_'+idx+'"></div><div class="try-result-label">Response body</div><div class="try-response-body" id="trybody_resp_'+idx+'"></div></div></div>';
}

function execTry(idx){
  var ep = allEps[idx];
  var params = {};
  ep.tryParams.forEach(function(p){
    var el = document.getElementById('tryp_'+idx+'_'+p.name);
    if(el) params[p.name] = el.value;
  });
  var path = ep.path;
  Object.keys(params).forEach(function(k){ path = path.replace('{'+k+'}',params[k]); });
  var curlStr = 'curl -X '+ep.method+' "https://smc.sud.uz'+path+'" \\\n  -H "Authorization: Bearer eyJhbGciOiJIUzI1NiJ9..." \\\n  -H "Content-Type: application/json"';
  var bodyEl = document.getElementById('trybody_'+idx);
  if(bodyEl && bodyEl.tagName==='TEXTAREA' && bodyEl.value){
    curlStr += ' \\\n  -d \''+bodyEl.value.replace(/\n/g,'\\n')+'\'';
  }
  document.getElementById('trycurl_'+idx).textContent = curlStr;
  document.getElementById('trycode_'+idx).textContent = '200 OK';
  document.getElementById('trybody_resp_'+idx).textContent = ep.mockResponse;
  document.getElementById('tryresult_'+idx).classList.add('show');
}

var allEps = [];
var main = document.getElementById('main');

ENDPOINTS.forEach(function(tag){
  var tagId = 'tag_'+tag.tag;
  var block = document.createElement('div');
  block.className = 'tag-block';

  var hdr = document.createElement('div');
  hdr.className = 'tag-header';
  hdr.innerHTML = '<span class="tag-title">'+tag.tag+'</span><span class="tag-desc-text">'+tag.tagDesc+'</span><span class="tag-chevron" id="tchev_'+tagId+'">∧</span>';
  hdr.onclick = function(){
    var body = document.getElementById('tbody_'+tagId);
    var chev = document.getElementById('tchev_'+tagId);
    var open = body.style.display !== 'none';
    body.style.display = open ? 'none' : 'block';
    chev.classList.toggle('closed', open);
    chev.textContent = open ? '∨' : '∧';
  };
  block.appendChild(hdr);

  var tbody = document.createElement('div');
  tbody.className = 'ep-wrap';
  tbody.id = 'tbody_'+tagId;

  tag.endpoints.forEach(function(ep){
    var idx = allEps.length;
    allEps.push(ep);

    var row = document.createElement('div');
    row.className = 'ep-row '+(methodRow[ep.method]||'row-get');

    var bar = document.createElement('div');
    bar.className = 'ep-summary-bar';
    bar.innerHTML = '<span class="method-tag '+(methodColor[ep.method]||'t-get')+'">'+ep.method+'</span>'
      +'<span class="ep-path">'+ep.path+'</span>'
      +(ep.isNew?'<span class="new-tag">NEW</span>':'')
      +'<span class="ep-op-summary">'+ep.summary+'</span>'
      +(ep.locked?'<span class="ep-lock">🔒</span>':'')
      +'<span class="ep-chevron-sm" id="epchev_'+idx+'">▼</span>';
    bar.onclick = function(){
      var d = document.getElementById('epdetail_'+idx);
      var ch = document.getElementById('epchev_'+idx);
      var open = d.classList.contains('open');
      d.classList.toggle('open',!open);
      ch.classList.toggle('open',!open);
      row.classList.toggle('open',!open);
    };
    row.appendChild(bar);

    var detail = document.createElement('div');
    detail.className = 'ep-detail';
    detail.id = 'epdetail_'+idx;

    var html = '';
    if(ep.info){
      html += '<div class="info-note">ℹ️ '+ep.info+'</div>';
    }
    html += '<p class="desc-text">'+ep.desc+'</p>';

    if(ep.params && ep.params.length){
      html += '<div class="detail-section"><div class="detail-section-title">Parameters</div><table class="params-table"><tr><th>Name</th><th>In</th><th>Type</th><th>Required</th><th>Description</th></tr>';
      ep.params.forEach(function(p){
        html += '<tr><td><b>'+p.name+'</b></td><td>'+p.in+'</td><td><span class="type-str">'+p.type+'</span></td><td>'+(p.required?'<span class="req-star">*</span>required':'optional')+'</td><td>'+p.desc+'</td></tr>';
      });
      html += '</table></div>';
    }

    if(ep.bodySchema){
      html += '<div class="detail-section"><div class="detail-section-title">Request body</div><div class="model-schema">'+ep.bodySchema.replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</div></div>';
    }

    if(ep.responses && ep.responses.length){
      html += '<div class="detail-section"><div class="detail-section-title">Responses</div><div class="resp-list">';
      ep.responses.forEach(function(r,ri){
        var rid = 'resp_'+idx+'_'+ri;
        html += '<div class="resp-item"><div class="resp-head" onclick="toggleResp(\''+rid+'\')">'
          +'<span class="resp-code-badge '+(respClass[r.code]||'r200')+'">'+r.code+'</span>'
          +'<span class="resp-desc">'+r.desc+'</span>'
          +'<span>▼</span>'
          +'</div><div class="resp-body" id="'+rid+'"><div class="model-schema">'+r.schema.replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</div></div></div>';
      });
      html += '</div></div>';
    }

    html += buildTry(ep, idx);

    detail.innerHTML = html;
    row.appendChild(detail);
    tbody.appendChild(row);
  });

  block.appendChild(tbody);
  main.appendChild(block);
});

function toggleResp(id){
  var el = document.getElementById(id);
  el.classList.toggle('open');
}
</script>
