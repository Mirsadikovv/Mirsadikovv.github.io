<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Huawei SMC + RSE8800A — API Reference</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Titillium Web',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fafafa;color:#3b4151;font-size:14px;line-height:1.5}
code{font-family:'Source Code Pro','SFMono-Regular',monospace;font-size:12px;background:#f4f4f4;padding:2px 5px;border-radius:3px;color:#e74c3c}

.topbar{background:#1b1b1b;padding:8px 20px;display:flex;align-items:center;gap:10px}
.topbar-logo{font-size:18px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px}
.topbar-logo-circle{width:30px;height:30px;border-radius:50%;background:#89bf04;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:15px}

.info-wrap{padding:20px 30px 0}
.info-title{font-size:32px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:10px}
.version-badge{font-size:12px;font-weight:700;background:#89bf04;color:#fff;padding:3px 8px;border-radius:4px}
.info-base{font-size:12px;color:#999;margin-bottom:4px}
.info-link{font-size:12px;color:#61affe;margin-bottom:8px;display:block}
.info-desc{font-size:14px;color:#555}

.schemes-row{padding:10px 30px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #e8e8e8;margin-top:16px}
.schemes-label{font-size:12px;font-weight:700;margin-right:8px}
.schemes-select{border:2px solid #41444e;border-radius:4px;padding:4px 8px;font-size:13px;background:#fff;cursor:pointer}
.auth-btn{border:2px solid #49cc90;background:rgba(73,204,144,.1);color:#3b4151;padding:6px 16px;border-radius:4px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px}
.auth-btn:hover{background:rgba(73,204,144,.2)}

.main{padding:0 30px 60px}

/* TAG BLOCK */
.tag-block{margin-top:16px;border:1px solid rgba(59,65,81,.3);border-radius:4px;overflow:hidden}
.tag-header{padding:10px 20px;display:flex;align-items:center;cursor:pointer;background:rgba(0,0,0,.07);user-select:none;gap:10px}
.tag-header:hover{background:rgba(0,0,0,.1)}
.tag-title{font-size:18px;font-weight:700}
.tag-subdesc{font-size:13px;color:#666;font-weight:400;flex:1}
.tag-arrow{font-size:18px;color:#555;transition:transform .2s}
.tag-arrow.closed{transform:rotate(-90deg)}

/* ENDPOINT ROW — full width, detail below */
.ep-block{border-top:1px solid rgba(59,65,81,.15)}
.ep-block:first-child{border-top:none}

.ep-summary{display:flex;align-items:center;gap:10px;padding:8px 20px;cursor:pointer;user-select:none;background:#fff;width:100%}
.ep-summary:hover{filter:brightness(0.97)}

/* left border per method */
.ep-summary.m-post{border-left:5px solid #49cc90;background:rgba(73,204,144,.07)}
.ep-summary.m-get{border-left:5px solid #61affe;background:rgba(97,175,254,.07)}
.ep-summary.m-delete{border-left:5px solid #f93e3e;background:rgba(249,62,62,.07)}
.ep-summary.m-patch{border-left:5px solid #50e3c2;background:rgba(80,227,194,.07)}
.ep-summary.m-ws{border-left:5px solid #9012fe;background:rgba(144,18,254,.07)}

.ep-summary.open.m-post{background:rgba(73,204,144,.15)}
.ep-summary.open.m-get{background:rgba(97,175,254,.15)}
.ep-summary.open.m-delete{background:rgba(249,62,62,.15)}
.ep-summary.open.m-patch{background:rgba(80,227,194,.15)}
.ep-summary.open.m-ws{background:rgba(144,18,254,.15)}

.method-pill{font-size:13px;font-weight:700;padding:5px 0;min-width:80px;text-align:center;border-radius:3px;flex-shrink:0;color:#fff}
.pill-post{background:#49cc90}
.pill-get{background:#61affe}
.pill-delete{background:#f93e3e}
.pill-patch{background:#50e3c2}
.pill-ws{background:#9012fe}

.ep-path-text{font-size:16px;font-weight:700;font-family:'Source Code Pro',monospace;flex:1}
.new-pill{font-size:10px;font-weight:700;background:#ff6b35;color:#fff;padding:2px 7px;border-radius:3px;flex-shrink:0}
.ep-op-text{font-size:13px;color:#3b4151;flex:2}
.ep-lock{font-size:13px;color:#bbb;flex-shrink:0}
.ep-arrow{font-size:11px;color:#aaa;flex-shrink:0;transition:transform .2s}
.ep-arrow.open{transform:rotate(180deg)}

/* DETAIL — full width below the row */
.ep-detail{display:none;padding:20px 24px 24px;background:#fff;border-top:1px solid #e8e8e8;width:100%}
.ep-detail.open{display:block}

.info-note{font-size:13px;padding:10px 14px;background:#e8f4fd;color:#0c4a6e;border-radius:4px;margin-bottom:14px;border-left:4px solid #61affe;line-height:1.6}
.desc-p{font-size:14px;color:#3b4151;margin-bottom:16px;line-height:1.7}

.section-title{font-size:14px;font-weight:700;color:#3b4151;margin:0 0 10px;padding-bottom:6px;border-bottom:1px solid #eee}

.params-tbl{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:16px}
.params-tbl th{text-align:left;padding:7px 12px;background:#f7f7f7;border:1px solid #e2e2e2;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:#555}
.params-tbl td{padding:8px 12px;border:1px solid #e2e2e2;vertical-align:top}
.req-mark{color:#f93e3e;font-weight:700}
.type-label{font-style:italic;font-size:12px;color:#777}

.schema-box{background:#f7f7f7;border:1px solid #e2e2e2;border-radius:4px;padding:12px 14px;font-family:'Source Code Pro',monospace;font-size:12px;line-height:1.8;white-space:pre;overflow-x:auto;margin-bottom:16px}

.resp-accordion{margin-bottom:6px;border:1px solid #e2e2e2;border-radius:4px;overflow:hidden}
.resp-head{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#f7f7f7;cursor:pointer}
.resp-head:hover{background:#efefef}
.r-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:3px}
.r200,.r204{background:#d4edda;color:#155724}
.r400{background:#fff3cd;color:#856404}
.r401,.r404{background:#f8d7da;color:#721c24}
.resp-label{font-size:13px;color:#555;flex:1}
.resp-body-box{display:none;padding:10px 12px;background:#fff}
.resp-body-box.open{display:block}

/* TRY IT */
.try-box{margin-top:20px;padding:16px;background:#f9f9f9;border:1px solid #e2e2e2;border-radius:4px}
.try-box-title{font-size:14px;font-weight:700;margin-bottom:12px;color:#3b4151}
.try-field-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.try-field-name{font-size:13px;font-weight:600;min-width:130px;color:#3b4151}
.try-input{border:1px solid #ccc;border-radius:4px;padding:6px 10px;font-size:13px;flex:1;font-family:inherit;background:#fff;color:#3b4151}
.try-input:focus{outline:none;border-color:#61affe;box-shadow:0 0 0 2px rgba(97,175,254,.2)}
.try-textarea{width:100%;height:110px;border:1px solid #ccc;border-radius:4px;padding:8px 10px;font-size:12px;font-family:'Source Code Pro',monospace;resize:vertical;margin-bottom:12px;background:#fff;color:#3b4151}
.try-textarea:focus{outline:none;border-color:#61affe}
.execute-btn{background:#4990e2;color:#fff;border:none;padding:8px 22px;border-radius:4px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.execute-btn:hover{background:#357abd}
.execute-btn:active{transform:scale(.98)}
.clear-btn{background:transparent;color:#555;border:1px solid #ccc;padding:8px 18px;border-radius:4px;font-size:14px;cursor:pointer;font-family:inherit;margin-left:8px}
.clear-btn:hover{background:#f0f0f0}

.try-result{display:none;margin-top:16px}
.try-result.show{display:block}
.result-label{font-size:12px;font-weight:700;color:#555;margin:10px 0 4px;text-transform:uppercase;letter-spacing:.4px}
.curl-box{background:#41444e;color:#e8e8e8;border-radius:4px;padding:12px 14px;font-family:'Source Code Pro',monospace;font-size:11px;white-space:pre-wrap;word-break:break-all;margin-bottom:4px}
.resp-code-text{font-size:14px;font-weight:700;color:#49cc90;margin-bottom:6px}
.resp-body-result{background:#f7f7f7;border:1px solid #e2e2e2;border-radius:4px;padding:12px 14px;font-family:'Source Code Pro',monospace;font-size:12px;white-space:pre;overflow-x:auto;max-height:320px;overflow-y:auto;line-height:1.7}
</style>
</head>

var allEps = [];
var main = document.getElementById('main');

DEFS.forEach(function(tagDef){
  var tagBlock = document.createElement('div');
  tagBlock.className = 'tag-block';

  // tag header
  var hdr = document.createElement('div');
  hdr.className = 'tag-header';
  var arrowId = 'tarrow_' + tagDef.tag;
  var bodyId  = 'tbody_'  + tagDef.tag;
  hdr.innerHTML = '<span class="tag-title">'+tagDef.tag+'</span>'
    + '<span class="tag-subdesc">'+tagDef.tagDesc+'</span>'
    + '<span class="tag-arrow" id="'+arrowId+'">∧</span>';
  hdr.addEventListener('click', function(){
    var b = document.getElementById(bodyId);
    var a = document.getElementById(arrowId);
    var open = b.style.display !== 'none';
    b.style.display = open ? 'none' : 'block';
    a.classList.toggle('closed', open);
    a.textContent = open ? '∨' : '∧';
  });
  tagBlock.appendChild(hdr);

  var tagBody = document.createElement('div');
  tagBody.id = bodyId;

  tagDef.eps.forEach(function(ep){
    var idx = allEps.length;
    allEps.push(ep);

    var epBlock = document.createElement('div');
    epBlock.className = 'ep-block';

    // summary row
    var sumRow = document.createElement('div');
    sumRow.className = 'ep-summary ' + (sumClass[ep.method]||'m-get');
    var detailId = 'epd_' + idx;
    var arrowSpId = 'epa_' + idx;
    sumRow.innerHTML =
      '<span class="method-pill '+(pillClass[ep.method]||'pill-get')+'">'+ep.method+'</span>'
      + '<span class="ep-path-text">'+ep.path+'</span>'
      + (ep.isNew ? '<span class="new-pill">NEW</span>' : '')
      + '<span class="ep-op-text">'+ep.summary+'</span>'
      + (ep.locked ? '<span class="ep-lock">🔒</span>' : '')
      + '<span class="ep-arrow" id="'+arrowSpId+'">▼</span>';

    sumRow.addEventListener('click', function(){
      var det = document.getElementById(detailId);
      var arr = document.getElementById(arrowSpId);
      var nowOpen = det.classList.contains('open');
      det.classList.toggle('open', !nowOpen);
      arr.classList.toggle('open', !nowOpen);
      sumRow.classList.toggle('open', !nowOpen);
    });
    epBlock.appendChild(sumRow);

    // detail panel
    var det = document.createElement('div');
    det.className = 'ep-detail';
    det.id = detailId;

    var html = '';

    if(ep.info){
      html += '<div class="info-note">ℹ️ '+ep.info+'</div>';
    }
    html += '<p class="desc-p">'+ep.desc+'</p>';

    if(ep.params && ep.params.length){
      html += '<div class="section-title">Parameters</div>';
      html += '<table class="params-tbl"><thead><tr><th>Name</th><th>In</th><th>Type</th><th>Required</th><th>Description</th></tr></thead><tbody>';
      ep.params.forEach(function(p){
        html += '<tr><td><b>'+p.name+'</b></td><td>'+p.in+'</td>'
          +'<td><span class="type-label">'+p.type+'</span></td>'
          +'<td>'+(p.req?'<span class="req-mark">* required</span>':'optional')+'</td>'
          +'<td>'+p.desc+'</td></tr>';
      });
      html += '</tbody></table>';
    }

    if(ep.bodySchema){
      html += '<div class="section-title" style="margin-top:16px">Request body</div>';
      html += '<div class="schema-box">'+escHtml(ep.bodySchema)+'</div>';
    }

    html += '<div class="section-title" style="margin-top:16px">Responses</div>';
    ep.responses.forEach(function(r, ri){
      var rbId = 'rb_'+idx+'_'+ri;
      html += '<div class="resp-accordion">'
        +'<div class="resp-head" onclick="toggleRb(\''+rbId+'\')">'
        +'<span class="r-badge '+(rcClass[r.code]||'r200')+'">'+r.code+'</span>'
        +'<span class="resp-label">'+r.desc+'</span>'
        +'<span>▼</span>'
        +'</div>'
        +'<div class="resp-body-box" id="'+rbId+'">'
        +'<div class="schema-box">'+escHtml(r.schema)+'</div>'
        +'</div></div>';
    });

    // Try it
    html += '<div class="try-box">';
    html += '<div class="try-box-title">Try it out</div>';
    if(ep.tryFields && ep.tryFields.length){
      html += '<div>';
      ep.tryFields.forEach(function(f){
        html += '<div class="try-field-row">'
          +'<span class="try-field-name">'+f.name+'</span>'
          +'<input class="try-input" id="tf_'+idx+'_'+f.name+'" value="'+escAttr(f.ph)+'" placeholder="'+escAttr(f.ph)+'">'
          +'</div>';
      });
      html += '</div>';
    }
    if(ep.bodySchema){
      html += '<div style="font-size:12px;font-weight:700;color:#555;margin-bottom:4px;margin-top:6px">Request body</div>';
      html += '<textarea class="try-textarea" id="tbody_'+idx+'">'+escHtml(ep.bodySchema)+'</textarea>';
    }
    html += '<button class="execute-btn" onclick="doExec('+idx+')">Execute</button>';
    html += '<button class="clear-btn" onclick="doClear('+idx+')">Clear</button>';
    html += '<div class="try-result" id="tres_'+idx+'">'
      +'<div class="result-label">Curl</div>'
      +'<div class="curl-box" id="tcurl_'+idx+'"></div>'
      +'<div class="result-label">Response code</div>'
      +'<div class="resp-code-text" id="tcode_'+idx+'"></div>'
      +'<div class="result-label">Response body</div>'
      +'<div class="resp-body-result" id="tresp_'+idx+'"></div>'
      +'</div>';
    html += '</div>';

    det.innerHTML = html;
    epBlock.appendChild(det);
    tagBody.appendChild(epBlock);
  });

  tagBlock.appendChild(tagBody);
  main.appendChild(tagBlock);
});

function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s){ return s.replace(/"/g,'&quot;'); }

function toggleRb(id){
  var el = document.getElementById(id);
  if(el) el.classList.toggle('open');
}

function doExec(idx){
  var ep = allEps[idx];
  var vals = {};
  if(ep.tryFields){
    ep.tryFields.forEach(function(f){
      var el = document.getElementById('tf_'+idx+'_'+f.name);
      if(el) vals[f.name] = el.value || f.ph;
    });
  }
  var path = ep.path;
  Object.keys(vals).forEach(function(k){ path = path.replace('{'+k+'}', vals[k]); });

  var curlParts = ['curl -X '+ep.method+' "https://smc.sud.uz'+path+'"',
    '  -H "Authorization: Bearer eyJhbGciOiJIUzI1NiJ9..."',
    '  -H "Content-Type: application/json"'];
  var tbody = document.getElementById('tbody_'+idx);
  if(tbody && tbody.value.trim()){
    curlParts.push("  -d '"+tbody.value.replace(/\n/g,' ')+"'");
  }
  document.getElementById('tcurl_'+idx).textContent = curlParts.join(' \\\n');
  document.getElementById('tcode_'+idx).textContent = '200';
  document.getElementById('tresp_'+idx).textContent = ep.mock;
  document.getElementById('tres_'+idx).classList.add('show');
}

function doClear(idx){
  document.getElementById('tres_'+idx).classList.remove('show');
}
</script>
